# Docker Compose voor Open WebUI met Help Overlay + Admin Panel
#
# Gebruik:
#   docker compose up -d --build
#
# Open daarna:
#   Open WebUI:    http://localhost:3000
#   Admin panel:   http://localhost:3002

services:
  open-webui:
    build: .
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_NAME=MijnOrganisatie AI
    restart: unless-stopped

  govchat-admin:
    build: ./admin
    container_name: govchat-admin
    ports:
      - "3002:3002"
    environment:
      - ADMIN_PASSWORD=${GOVCHAT_ADMIN_PASSWORD:-changeme}
      - CORS_ORIGIN=${GOVCHAT_CORS_ORIGIN:-*}
    volumes:
      - govchat-admin-data:/data
    restart: unless-stopped

volumes:
  open-webui-data:
  govchat-admin-data:
