<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen - GovChat Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1b2d; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(26,54,93,0.6) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(230,81,0,0.08) 0%, transparent 50%); pointer-events: none; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); padding: 2.5rem; width: 100%; max-width: 400px; position: relative; }
  .card::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: linear-gradient(90deg, #1a365d, #e65100); border-radius: 0 0 3px 3px; }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo svg { width: 64px; height: 64px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1)); }
  .brand { text-align: center; margin-bottom: 0.25rem; }
  .brand-name { font-size: 1.375rem; font-weight: 700; color: #1a365d; letter-spacing: -0.01em; }
  .brand-name .nl { color: #e65100; }
  .brand-sub { font-size: 0.8rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; }
  .sub { color: #64748b; font-size: 0.8rem; margin-bottom: 1.75rem; text-align: center; margin-top: 0.625rem; }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
  input[type="password"] { width: 100%; padding: 0.7rem 0.875rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9375rem; outline: none; transition: all 0.2s; background: #f8fafc; }
  input[type="password"]:focus { border-color: #1a365d; box-shadow: 0 0 0 3px rgba(26,54,93,0.1); background: #fff; }
  button { width: 100%; padding: 0.75rem; background: #1a365d; color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; margin-top: 1.25rem; transition: all 0.2s; letter-spacing: 0.02em; }
  button:hover { background: #e65100; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(230,81,0,0.3); }
  button:active { transform: translateY(0); }
  .error { color: #dc2626; font-size: 0.8rem; margin-top: 0.75rem; text-align: center; font-weight: 500; }
  .footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="56" r="48" fill="#1a365d"/>
      <line x1="25" y1="35" x2="45" y2="50" stroke="#2a5a8e" stroke-width="1.5" opacity="0.5"/>
      <line x1="75" y1="50" x2="95" y2="35" stroke="#2a5a8e" stroke-width="1.5" opacity="0.5"/>
      <line x1="40" y1="75" x2="60" y2="60" stroke="#2a5a8e" stroke-width="1.5" opacity="0.5"/>
      <line x1="80" y1="75" x2="60" y2="60" stroke="#2a5a8e" stroke-width="1.5" opacity="0.5"/>
      <circle cx="25" cy="35" r="3" fill="#2a5a8e" opacity="0.5"/>
      <circle cx="95" cy="35" r="3" fill="#2a5a8e" opacity="0.5"/>
      <circle cx="40" cy="75" r="3" fill="#2a5a8e" opacity="0.5"/>
      <circle cx="80" cy="75" r="3" fill="#2a5a8e" opacity="0.5"/>
      <line x1="35" y1="25" x2="85" y2="65" stroke="#e65100" stroke-width="7" stroke-linecap="round"/>
      <line x1="85" y1="25" x2="35" y2="65" stroke="#e65100" stroke-width="7" stroke-linecap="round"/>
      <path d="M52,52 L48,82 Q48,88 60,88 Q72,88 72,82 L68,52 Z" fill="#f0ece4"/>
      <path d="M56,62 L58,56 L62,56 L64,62 Z" fill="#1a365d" opacity="0.6"/>
      <circle cx="60" cy="46" r="5" fill="#e65100"/>
      <circle cx="60" cy="46" r="2.5" fill="#c44000"/>
      <polygon points="50,100 60,104 55,90" fill="#1a365d"/>
    </svg>
  </div>
  <div class="brand">
    <div class="brand-name">GovChat-<span class="nl">NL</span></div>
    <div class="brand-sub">Admin Panel</div>
  </div>
  <p class="sub">Beheer handleiding en app configuratie</p>
  <form method="POST" action="/login">
    <label for="password">Wachtwoord</label>
    <input type="password" id="password" name="password" placeholder="Voer het beheerderswachtwoord in" required autofocus>
    <button type="submit">Inloggen</button>
  </form>
  {{error}}
  <div class="footer">GovChat-NL Admin &middot; Beveiligde toegang</div>
</div>
</body>
</html>
